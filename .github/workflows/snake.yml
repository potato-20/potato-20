name: Snake

on:
  schedule:
    - cron: "0 2 * * *"        # daily refresh
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # future-proof (Node20 deprecation)

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?palette=github-light&color_snake=#5C4EF0&color_dots=#ebedf0,#9be9a8,#40c463,#30a14e,#216e39
            dist/snake-dark.svg?palette=github-dark&color_snake=#5C4EF0&color_dots=#161b22,#01311f,#005f2e,#00C853,#39ff14

      - name: Slow down animation (1.4x)
        run: |
          for f in dist/snake.svg dist/snake-dark.svg; do
            python3 - "$f" <<'PY'
import re, sys
p = sys.argv[1]
s = open(p, encoding="utf-8").read()
s = re.sub(r'(\d+)ms', lambda m: f"{int(int(m.group(1))*1.4)}ms", s)
open(p, "w", encoding="utf-8").write(s)
print("slowed", p)
PY
          done

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
